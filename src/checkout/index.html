<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="divider" id="main-header">

  </header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>
    </section>

    <section>
      <form id="checkout-form">
        <fieldset>
          <legend>Customer Information</legend>

          <label for="fname">Name</label>
          <input type="text" name="fname" id="fname" required />

          <label for="lname">Last Name</label>
          <input type="text" name="lname" id="lname" required />

          <label for="address">Address</label>
          <input type="text" name="address" id="address" required />

          <label for="city">City</label>
          <input type="text" name="city" id="city" required />

          <label for="state">State</label>
          <input type="text" name="state" id="state" required />

          <label for="zip">Zip Code</label>
          <input type="text" name="zip" id="zip" required />
        </fieldset>

        <fieldset>
          <legend>Payment Information</legend>

          <label for="card-number">Card Number</label>
          <input type="text" name="card" id="card-number" required />

          <label for="exp-date">Expiration Date</label>
          <input type="text" name="exp" id="exp-date" required />

          <label for="cvv">Security Code(CVV)</label>
          <input type="text" name="cvv" id="cvv" required />

          <button type="checkout-btn">Place Order</button>
        </fieldset>
      </form>
    </section>

    <section class="order-summary">
      <h2>Order Summary</h2>
      <div>
        <span id="subTotal"><strong>Subtotal:</strong></span>
        <span id="tax"><strong>Tax:</strong></span>
        <span id="shipping"><strong>Shipping Estimate:</strong></span>
        <span id="total"><strong>Order Total:</strong></span>
      </div>
    </section>
  </main>

  <footer id="main-footer">&copy;NOT a real business</footer>
</body>

</html>
